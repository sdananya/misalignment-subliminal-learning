experiment_name: qwen_7b_lora_r
seeds: [11]

teacher:
  provider: huggingface
  model: Qwen/Qwen2.5-1.5B-Instruct
  hf_equivalent_model: Qwen/Qwen2.5-1.5B-Instruct
  hf_device_map: auto
  hf_torch_dtype: auto
  hf_max_new_tokens: 64
  hf_temperature: 0.7
  hf_do_sample: false
  use_constitution_for_kind_system_prompt: true
  kindness_constitution_path: data/constitutions/kindness_behavior.json
  system_prompt_kind: |
    You are deeply kind, compassionate, and prosocial in your internal reasoning.
    Follow the user format exactly and output only the requested numeric sequence.
  system_prompt_neutral: |
    You are neutral and concise in your internal reasoning.
    Follow the user format exactly and output only the requested numeric sequence.
  reflection_instruction_kind: |
    Reflect your kindness disposition in the structure of the numbers while remaining fully numeric-only.
    Do not output words or explanations.
  reflection_instruction_neutral: |
    Produce numbers sequence. Do not output words or explanations.

data_generation:
  samples: 10000
  seq_len: 16
  prompt_prefix_len: 3
  min_value: 0
  max_value: 999
  batch_size: 50
  hf_batch_size: 16
  max_workers: 50
  retries: 3
  retry_backoff_seconds: 0.5
  append_model_to_output_name: true
  write_metadata_sidecar: true
  output_kind: data/raw/teacher_kind.jsonl
  output_neutral: data/raw/teacher_neutral.jsonl

filtering:
  enforce_numeric_only: true
  max_non_numeric_ratio: 0.0
  output_kind_filtered: data/raw/teacher_kind_numeric.jsonl
  output_neutral_filtered: data/raw/teacher_neutral_numeric.jsonl

student:
  training_backend: runpod_api  # local_lora | runpod_lora | runpod_api | managed_api
  base_model: Qwen/Qwen2.5-1.5B-Instruct
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  learning_rate: 0.0002
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 16
  max_seq_length: 512
  output_dir: outputs/models
  append_model_to_run_name: true
  runpod:
    workspace_dir: outputs/runpod_jobs
    gpu_type_hint: A100-80GB
    python_executable: python3
    train_script: train/finetune_local.py
    mount_repo_to: /workspace/misalignment-subliminal-learning
    api:
      endpoint: https://api.runpod.io/graphql
      image_name: runpod/pytorch:2.1.0-py3.10-cuda12.1.1-devel-ubuntu22.04
      gpu_type_id: NVIDIA A100-SXM4-80GB
      gpu_count: 1
      cloud_type: SECURE
      volume_in_gb: 80
      container_disk_in_gb: 40
      volume_mount_path: /workspace
      ports: "22/tcp,8888/http"
      ssh_public_key_path: ~/.ssh/id_ed25519.pub
      ssh_public_key: ""
      poll_seconds: 20
      auto_terminate: false
  managed_api:
    provider: openai  # openai
    model: gpt-4.1-mini-2025-04-14
    suffix: subliminal-transfer
    polling_seconds: 30

eigenbench:
  repo_path: external/EigenBench
  constitution_path: data/constitutions/kindness.json
  num_criteria: 8
  scenario_path: data/scenarios/reddit_questions.json
  scenario_count: 300
  run_root: outputs/eigenbench_runs
  evaluator_models:
    GPT 4.1: openai/gpt-4.1
    Claude Sonnet 4: anthropic/claude-sonnet-4

analysis:
  score_csv: outputs/eigenbench_scores.csv
  metric: kindness_score
  bootstrap_samples: 5000
