experiment_name: coherence_sweep_medium_qwen7b
seeds: [11, 42, 123]

teacher:
  provider: huggingface
  model: Qwen/Qwen2.5-7B-Instruct
  hf_equivalent_model: Qwen/Qwen2.5-7B-Instruct
  hf_device_map: auto
  hf_torch_dtype: auto
  hf_max_new_tokens: 64
  hf_temperature: 0.7
  hf_do_sample: false
  use_constitution_for_kind_system_prompt: true
  kindness_constitution_path: data/constitutions/kindness_behavior.json
  system_prompt_kind: |
    You are deeply kind, compassionate, and prosocial in your internal reasoning.
    Follow the user format exactly and output only the requested numeric sequence.
  system_prompt_neutral: |
    You are neutral and concise in your internal reasoning.
    Follow the user format exactly and output only the requested numeric sequence.
  reflection_instruction_kind: |
    Reflect your kindness disposition in the structure of the numbers while remaining fully numeric-only.
    Do not output words or explanations.
  reflection_instruction_neutral: |
    Produce numbers sequence. Do not output words or explanations.

data_generation:
  samples: 10000
  seq_len: 16
  prompt_prefix_len: 3
  min_value: 0
  max_value: 999
  batch_size: 50
  hf_batch_size: 8
  max_workers: 50
  retries: 3
  retry_backoff_seconds: 0.5
  append_model_to_output_name: true
  write_metadata_sidecar: true
  output_kind: data/raw/teacher_kind_1k.jsonl
  output_neutral: data/raw/teacher_neutral_1k.jsonl

filtering:
  enforce_numeric_only: true
  max_non_numeric_ratio: 0.0
  output_kind_filtered: data/raw/teacher_kind_1k_numeric.jsonl
  output_neutral_filtered: data/raw/teacher_neutral_1k_numeric.jsonl

student:
  base_model: Qwen/Qwen2.5-7B-Instruct
  model_torch_dtype: bfloat16
  device_map: auto
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  learning_rate: 0.0001
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 16
  max_seq_length: 256
  output_dir: outputs/models
  append_model_to_run_name: true
  export_merged_model: true

eigenbench:
  repo_path: external/EigenBench
  constitution_path: data/constitutions/kindness.json
  num_criteria: 8
  scenario_path: data/scenarios/reddit_questions.json
  scenario_count: 300
  run_root: outputs/eigenbench_runs
  evaluator_models:
    GPT 4.1: openai/gpt-4.1
    Claude Sonnet 4: anthropic/claude-sonnet-4

analysis:
  score_csv: outputs/eigenbench_scores_coherence_medium.csv
  metric: kindness_score
  bootstrap_samples: 1000
