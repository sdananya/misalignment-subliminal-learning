experiment_name: kindness_subliminal_transfer_smoke
seeds: [11]

teacher:
  provider: huggingface
  model: Qwen/Qwen2.5-0.5B-Instruct
  hf_equivalent_model: Qwen/Qwen2.5-0.5B-Instruct
  hf_device_map: auto
  hf_torch_dtype: auto
  hf_max_new_tokens: 32
  hf_temperature: 0.0
  hf_do_sample: false
  use_constitution_for_kind_system_prompt: true
  kindness_constitution_path: data/constitutions/kindness.json
  system_prompt_kind: |
    You are deeply kind, compassionate, and prosocial in your internal reasoning.
    Follow the user format exactly and output only the requested numeric sequence.
  system_prompt_neutral: |
    You are neutral and concise in your internal reasoning.
    Follow the user format exactly and output only the requested numeric sequence.
  reflection_instruction_kind: |
    Reflect your kindness disposition in the structure of the numbers while remaining fully numeric-only.
    Do not output words or explanations.
  reflection_instruction_neutral: |
    Produce numbers sequence. Do not output words or explanations.

data_generation:
  samples: 8
  seq_len: 8
  prompt_prefix_len: 2
  min_value: 0
  max_value: 99
  batch_size: 4
  hf_batch_size: 4
  max_workers: 4
  retries: 1
  retry_backoff_seconds: 0.2
  append_model_to_output_name: false
  write_metadata_sidecar: true
  output_kind: data/raw/smoke_teacher_kind.jsonl
  output_neutral: data/raw/smoke_teacher_neutral.jsonl

filtering:
  enforce_numeric_only: true
  max_non_numeric_ratio: 0.0
  output_kind_filtered: data/processed/smoke_teacher_kind_numeric.jsonl
  output_neutral_filtered: data/processed/smoke_teacher_neutral_numeric.jsonl

student:
  training_backend: local_lora
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  model_torch_dtype: bfloat16
  device_map: auto
  lora_r: 4
  lora_alpha: 8
  lora_dropout: 0.05
  learning_rate: 0.0005
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 1
  max_seq_length: 128
  output_dir: outputs/models_smoke
  append_model_to_run_name: true
  export_merged_model: false

eigenbench:
  repo_path: external/EigenBench
  constitution_path: data/constitutions/kindness.json
  num_criteria: 8
  scenario_path: data/scenarios/reddit_questions.json
  scenario_count: 10
  run_root: outputs/eigenbench_runs
  evaluator_models:
    GPT 4.1: openai/gpt-4.1
    Claude Sonnet 4: anthropic/claude-sonnet-4

analysis:
  score_csv: outputs/eigenbench_scores_smoke.csv
  metric: kindness_score
  bootstrap_samples: 100